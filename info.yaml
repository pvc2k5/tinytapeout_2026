project:
  title:        "7-Channel PWM Controller "      # Project title
  author:       "pvc"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "7-channel PWM controller with configurable frequency, dead-time insertion, phase offset, and fault protection, configured via SPI"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_pwm7ch"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "top_pwm.v"
    - "spi_pwm.v"
    - "register_file.v"
    - "Prescaler.v"
    - "PWM_core.v"
    - "Dead_time.v"
    - "fault_protect.v"
    - "mux_out.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "SCK"
  ui[1]: "MOSI"
  ui[2]: "CS_n"
  ui[3]: "nFAULT"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "PWM_H0 - High-side channel 0"
  uo[1]: "PWM_H0 - High-side channel 1"
  uo[2]: "PWM_H0 - High-side channel 2"
  uo[3]: "PWM_H0 - High-side channel 3"
  uo[4]: "PWM_H0 - High-side channel 4"
  uo[5]: "PWM_H0 - High-side channel 5"
  uo[6]: "PWM_H0 - High-side channel 6"
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "PWM_L0 - Low-side channel 0"
  uio[1]: "PWM_L1 - Low-side channel 1"
  uio[2]: "PWM_L2 - Low-side channel 2"
  uio[3]: "PWM_L3 - Low-side channel 3"
  uio[4]: "PWM_L4 - Low-side channel 4"
  uio[5]: "PWM_L5 - Low-side channel 5"
  uio[6]: "PWM_L6 - Low-side channel 6"
  uio[7]: "MISO"

# Do not change!
yaml_version: 6
